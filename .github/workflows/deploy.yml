name: CI/CD Backend - Vidal Casino

on:
  push:
    branches:
      - deploy 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/casino-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/casino-backend:v1.0.0
            ${{ secrets.DOCKERHUB_USERNAME }}/casino-backend:${{ github.sha }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to AWS EC2 and Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |

            ssh -o StrictHostKeyChecking=no ec2-user@10.0.138.125 "
              docker stop casino_backend || true && \
              docker rm casino_backend || true && \
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/casino-backend:latest && \
              docker run -d --name casino_backend -p 3000:3000 -e DATABASE_URL='postgresql://postgres:vidal_casino_secret@10.0.138.125:5432/vidal_casino?schema=public' ${{ secrets.DOCKERHUB_USERNAME }}/casino-backend:latest
            "